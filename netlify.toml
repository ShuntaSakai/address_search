[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/postal-search"
  to = "/.netlify/functions/postal-search"
  status = 200

[[redirects]]
  from = "/api/address-search"
  to = "/.netlify/functions/address-search"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
